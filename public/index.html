<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1M Checkboxes — Toggle a Million Boxes in Real Time</title>
    <meta name="description" content="A real-time collaborative experience where you and thousands of others toggle from a million checkboxes. Built with WebSockets and Redis.">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✓</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Welcome Splash -->
    <div class="welcome-overlay" id="welcome-overlay">
        <div class="welcome-content">
            <div class="welcome-logo">✓</div>
            <div class="welcome-title">1M Checkboxes</div>
            <div class="welcome-subtitle">Loading grid…</div>
        </div>
    </div>

    <div id="ui-layer">
        <header class="glass-panel">
            <div class="logo">
                <div class="logo-box">✓</div>
                <h1>1M Checkboxes</h1>
            </div>

            <div class="stats-bar" id="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Checked</span>
                    <span class="stat-value" id="checked-count">0</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Online</span>
                    <span class="stat-value" id="online-count">1</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Zoom</span>
                    <span class="stat-value" id="zoom-level">2.0×</span>
                </div>
            </div>
        </header>

        <div class="coords-panel glass-panel" id="coords-panel">
            <span id="coord-display">0, 0</span>
        </div>

        <div class="zoom-controls glass-panel">
            <button id="zoom-in" class="btn-icon" title="Zoom In">+</button>
            <button id="zoom-out" class="btn-icon" title="Zoom Out">−</button>
            <button id="reset-view" class="btn-icon" title="Reset View">⌂</button>
        </div>

        <div class="status-panel glass-panel">
            <span id="connection-status" class="status-dot disconnected"></span>
            <span id="status-text">Connecting…</span>
        </div>

        <div id="toast-container"></div>
    </div>

    <!-- The Grid Canvas -->
    <canvas id="gridCanvas"></canvas>

    <script src="app.js"></script>
</body>
</html>
