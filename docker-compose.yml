version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: million_checkboxes_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Enabling append-only mode so your checkboxes are saved even if the container restarts
    command: redis-server --appendonly yes

volumes:
  redis_data:
